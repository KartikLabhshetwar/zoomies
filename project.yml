name: Zoomies
options:
  bundleIdPrefix: com.zoomies
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_TESTABILITY: "YES"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ZoomiesCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/ZoomiesCore
    dependencies:
      - sdk: IOKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoomies.core
  Zoomies:
    type: application
    platform: macOS
    sources:
      - path: Sources/Zoomies
        excludes:
          - "Info.plist"
          - "Sprites"
      - path: Sources/Zoomies/Sprites
        type: folder
    dependencies:
      - target: ZoomiesCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoomies.app
        INFOPLIST_FILE: Sources/Zoomies/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ZoomiesCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/ZoomiesCoreTests
    dependencies:
      - target: ZoomiesCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoomies.coretests
schemes:
  Zoomies:
    build:
      targets:
        Zoomies: all
        ZoomiesCoreTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ZoomiesCoreTests
